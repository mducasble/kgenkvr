kind = "web"
  previewPath = "/"
  title = "Recording App"
  version = "1.0.0"

  [[services]]
  localPort = 5174
  name = "web"
  paths = ["/"]

  [services.development]
  run = "pnpm --filter @workspace/electron-app run dev"

  [services.development.env]
  PORT = "5174"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/electron-app", "run", "build:renderer"]

  [services.production.serve]
  type = "static"
  path = "artifacts/electron-app/dist/renderer"
  